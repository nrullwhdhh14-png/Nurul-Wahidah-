<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liburan ke Pantai</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Poppins', sans-serif;
    }

    body{
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#ffb6d9,#8fd3ff);
      position:relative;
    }

    /* STIKER */
    .sticker{
      position:absolute;
      font-size:50px;
      animation: float 4s ease-in-out infinite;
      user-select:none;
    }

    .s1{ top:8%; left:10%; }
    .s2{ top:15%; right:12%; animation-delay:1s; }
    .s3{ bottom:12%; left:15%; animation-delay:2s; }
    .s4{ bottom:10%; right:10%; animation-delay:3s; }
    .s5{ top:45%; left:5%; animation-delay:1.5s; }
    .s6{ top:40%; right:5%; animation-delay:2.5s; }

    @keyframes float{
      0%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-15px);
      }
      100%{
        transform:translateY(0px);
      }
    }

    .container{
      width:90%;
      max-width:500px;
      padding:40px;
      text-align:center;
      background:rgba(255,255,255,0.2);
      backdrop-filter:blur(10px);
      border-radius:30px;
      box-shadow:0 8px 20px rgba(0,0,0,0.2);
      position:relative;
      z-index:2;
    }

    h1{
      color:white;
      font-size:35px;
      margin-bottom:15px;
      text-shadow:2px 2px 5px rgba(0,0,0,0.2);
    }

    p{
      color:white;
      font-size:18px;
      margin-bottom:35px;
    }

    .btn-area{
      position:relative;
      height:150px;
    }

    button{
      border:none;
      padding:14px 30px;
      border-radius:50px;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
      font-weight:bold;
      position:absolute;
    }

    #yesBtn{
      background:#ff5ca8;
      color:white;
      left:25%;
      box-shadow:0 5px 15px rgba(255,92,168,0.4);
    }

    #yesBtn:hover{
      transform:scale(1.1);
    }

    #noBtn{
      background:#4db8ff;
      color:white;
      left:55%;
      box-shadow:0 5px 15px rgba(77,184,255,0.4);
    }

    #message{
      display:none;
      margin-top:25px;
      color:white;
      font-size:22px;
      font-weight:bold;
      animation:fade 1s ease;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

  </style>
</head>
<body>

  <!-- STIKER -->
  <div class="sticker s1">🏖️</div>
  <div class="sticker s2">🌴</div>
  <div class="sticker s3">🌊</div>
  <div class="sticker s4">🐚</div>
  <div class="sticker s5">☀️</div>
  <div class="sticker s6">🍹</div>

  <div class="container">
    <h1>🌸 Liburan ke Pantai 🌊</h1>

    <p>
      Mau ikut liburan seru ke pantai bareng aku? 🏖️💖
    </p>

    <div class="btn-area">
      <button id="yesBtn">Iya 💕</button>
      <button id="noBtn">Tidak 😜</button>
    </div>

    <div id="message">
      Yeayyy! 🌴✨<br>
      Kita bakal menikmati sunset, ombak pantai, dan minum es kelapa bareng! 🍹💖
    </div>
  </div>

  <script>

    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const message = document.getElementById("message");

    // Tombol "Tidak" kabur terus
    noBtn.addEventListener("mouseover", moveButton);
    noBtn.addEventListener("click", moveButton);

    function moveButton(){
      const maxX = window.innerWidth - noBtn.offsetWidth;
      const maxY = window.innerHeight - noBtn.offsetHeight;

      const randomX = Math.floor(Math.random() * maxX);
      const randomY = Math.floor(Math.random() * maxY);

      noBtn.style.position = "fixed";
      noBtn.style.left = randomX + "px";
      noBtn.style.top = randomY + "px";
    }

    // Tombol "Iya"
    yesBtn.addEventListener("click", () => {

      message.style.display = "block";

      document.body.style.background =
        "linear-gradient(135deg,#ff9acb,#6ec6ff)";

      yesBtn.innerHTML = "💖 Yeayyy 💖";
    });

  </script>

</body>
  </html>
